# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - pindorama-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PUBLISH_PATH: ${{ github.workspace }}/published-app
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build with dotnet
        run: dotnet build ./tcg-api.sln --configuration Release

      - name: dotnet publish
        run: dotnet publish ./TcgApi.csproj -c Release -o "${{ env.PUBLISH_PATH }}"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./.net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_92A79CC3F71B4771876F8A470F62E286 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5E25F8848C854E7AA3F87BE128BD2C9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C21BB8BE69BE4AF299BFAAD76E37F5B8 }}

      - name: Configure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'pindorama-api'
          app-settings-json: |
            [
              {
                "name": "ConnectionStrings__DefaultConnection",
                "value": "Host=aws-1-us-west-2.pooler.supabase.com;Port=5432;Database=postgres;Username=postgres.sunqfrmovcbwdbmnicnv;Password=${{ secrets.DB_PASSWORD }};SSL Mode=Require;Trust Server Certificate=true",
                "slotSetting": false
              },
              {
                "name": "Jwt__Key",
                "value": "${{ secrets.JWT_KEY }}",
                "slotSetting": false
              }
            ]

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pindorama-api'
          slot-name: 'Production'
          package: ./.net-app
          